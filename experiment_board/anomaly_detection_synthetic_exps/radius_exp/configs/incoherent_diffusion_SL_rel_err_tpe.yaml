# Default Experiment Configuration for GTV-EXP-1
project_name: 'AD_Journal_Experiments'
group_name: 'radius_exp'
config_name: 'incoherent_diffusion_SL_rel_err_tpe'
tags: ['varying_radiuss', 'SL_rel_err', 'repeated', 'tpe', 'incoherent', 'diffusion']
notes: 'Description of the experiment

--------------------------

Question: How does the models performance change with varying radius of anomalies?
'
data:
  lowrank:
    dim: [225, 50, 24]
    ranks: [30, 20, 15]
    # std: 1.0
  graph:
    type: "grid"
    n: 15
    m: 15
    periodic: false
    seed: 0
  anomaly:
    num_anomalies: 300
    amplitude: 0.125
    duration: 1
    window_type: 'boxcar' #'cosine', 'boxcar'
    distribution: 'uniform'
    local_dist: 'bernoulli'
    time_m: 3
    local_m: 1
    radius: 2
    anomaly_spread: 'isotropic'
  repeated: 1
  noise:
    type: 'AWGN'
    SNR: 28
independent_var:
  keys: ['anomaly', 'radius']
  range: [0, 1, 2, 3, 4, 5, 6, 7]
dependent_var:
  - AUC-PRC
  - AUC-ROC
  - S_err
  - L_err
  - rel_err
study_config:
  metrics: ['max_SL_rel_err']
  overwrite: True
  directions: ['minimize']
  n_trials: 1000
  lda_gtv_min: 0.00001
  lda_gtv_max: 10
  lda_gtv_log: True
  search_rho: False
  sampler_config:
    type: 'TPESampler' # ['TPESampler', 'GPSampler', 'RamdomSampler']
    params:
      seed: 42
models:
  HORPCA_F:
    model: "SNN_LOGN_GTV"
    name: "HoRPCA-f"
    soft_constrained: True
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 0
    weighing: 'size_normalized_inv'
    err_tol: 0.1
    max_iter: 175
    rho_update: 'domain_parametrization'
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: []
    gtvr_config: []
  SNN_LOGNSN_F:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[LOGN(S-N)]-f"
    soft_constrained: True
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 1
    weighing: 'size_normalized_inv'
    err_tol: 0.1
    max_iter: 175
    rho_update: 'domain_parametrization'
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: []
    gtvr_config: []
  SNN_L1_GTVS_F:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[L1+GTV(S)]-f"
    soft_constrained: True
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 0
    weighing: 'size_normalized_inv'
    err_tol: 0.1
    max_iter: 175
    rho_update: 'domain_parametrization'
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: [] 
    gtvr_config:
      - graph: 'spatial'
        mode : [1]
        p: 2
        variation_type: GTV
        normalization: 'none'
  SNN_L1_GTV1S_F:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[L1+GTV_1(S)]-f"
    soft_constrained: True
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 0
    weighing: 'size_normalized_inv'
    err_tol: 0.1
    max_iter: 175
    rho_update: 'domain_parametrization'
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: [] 
    gtvr_config:
      - graph: 'spatial'
        mode : [1]
        p: 1
        variation_type: GTV
        normalization: 'none'
