# Default configurations for models used in the experiments that configure the SNN__LOGN_GTV algorithm.
HORPCA:
  model: "SNN_LOGN_GTV"
  name: "HoRPCA"
  lr_modes: [1, 2, 3]
  graph_modes: [1]
  graph: 'spatial'
  grouping: 'neighbor'
  r_hop: 0
  weighing: 'size_normalized_inv'
  err_tol: 0.1
  max_iter: 200
  rho_update: 'domain_parametrization'
  rho_update_thr: 100
  verbose: 0
  lda_gtvs: []
  gtvr_config: []
HORPCA_F:
  model: "SNN_LOGN_GTV"
  name: "HoRPCA-f"
  soft_constrained: True
  lr_modes: [1, 2, 3]
  graph_modes: [1]
  graph: 'spatial'
  grouping: 'neighbor'
  r_hop: 0
  weighing: 'size_normalized_inv'
  err_tol: 0.1
