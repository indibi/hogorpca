models:
  HoRPCA:
    model: "HoRPCA"
    name: "HoRPCA"
    lr_modes: [1, 2, 3]
    err_tol: 1.0e-6
    maxit: 150
    rho_update: 1
    mu: 100
    verbose: 0
    t: 0.26074 # Boxcar
    # Taylor
    # Cosine
  SNN_LOGS:
    model: "SNN_LOGS"
    name: "[SNN]-[LOGN(N)]"
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    grouping: 'neighbor'
    r_hop: 1
    t: 0.26074 # Boxcar
    # Taylor
    # Cosine
    weighing: 'size_normalized_inv'
    err_tol: 1.0e-6
    max_iter: 150
    rho_update: 1
    rho_update_thr: 100
    verbose: 0