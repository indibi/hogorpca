# Hyper-parameter study for joint spatio-temporal grouping of the SNN-LOGN model

data:
  lowrank:
    dim: [225, 50, 24]
    ranks: [12, 5, 5]
    # std: 1.0
  graph:
    type: "grid"
    n: 15
    m: 15
    periodic: false
    seed: 0
  anomaly:
    num_anomalies: 150
    amplitude: 0.25
    duration: 8
    window_type: 'taylor' #'cosine', 'boxcar'
    distribution: 'uniform'
    local_dist: 'constant'
    time_m: 3
    local_m: 1
    anomaly_spread: 'isotropic'
  noise:
    type: 'AWGN'
    SNR: 10
independent_var:
  radii: [0, 1, 2, 3]
study_config:
  storage: 'sqlite:///exp3_snnlogn_gtv.db'
  n_trials: 30
  lda_gtv_min: 0.00000001
  lda_gtv_max: 10
  lda_gtv_log: True
models:
  HoRPCA:
    model: "HoRPCA"
    name: "HoRPCA"
    lr_modes: [1, 2, 3]
    err_tol: 1.0e-6
    maxit: 150
    rho_update: 1
    mu: 100
    verbose: 0
  SNN_L1_GTV_S:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[L1+GTV(S)]"
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 0
    weighing: 'size_normalized_inv'
    err_tol: 1.0e-6
    max_iter: 150
    rho_update: 1
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: [] 
    gtvr_config: 
      - graph: spatial
        mode : [1]
        p: 2
        variation_type: GTV
  SNN_L1_GTV_T:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[L1+GTV(T)]"
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 0
    weighing: 'size_normalized_inv'
    err_tol: 1.0e-6
    max_iter: 150
    rho_update: 1
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: [] 
    gtvr_config:
      - graph: 'temporal'
        mode : [3]
        p: 1
        variation_type: GTV
  SNN_L1_GTV_ST:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[L1+GTV(ST)]"
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 0
    weighing: 'size_normalized_inv'
    err_tol: 1.0e-6
    max_iter: 150
    rho_update: 1
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: []
    gtvr_config:
      - graph: spatial
        mode : [1]
        p: 2
        variation_type: GTV
      - graph: 'temporal'
        mode : [3]
        p: 1
        variation_type: GTV
  SNN_LOGN_GTV_ST:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[LOGN(S-N)+GTV(ST)]"
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 1
    weighing: 'size_normalized_inv'
    err_tol: 1.0e-6
    max_iter: 150
    rho_update: 1
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: []
    gtvr_config:
      - graph: spatial
        mode : [1]
        p: 2
        variation_type: GTV
      - graph: 'temporal'
        mode : [3]
        p: 1
        variation_type: GTV
  SNN_LOGN:
    model: "SNN_LOGN_GTV"
    name: "[SNN]-[LOGN(S-N)]"
    lr_modes: [1, 2, 3]
    graph_modes: [1]
    graph: 'spatial'
    grouping: 'neighbor'
    r_hop: 1
    weighing: 'size_normalized_inv'
    err_tol: 1.0e-6
    max_iter: 150
    rho_update: 1
    rho_update_thr: 100
    verbose: 0
    lda_gtvs: []
    gtvr_config: []
    
  